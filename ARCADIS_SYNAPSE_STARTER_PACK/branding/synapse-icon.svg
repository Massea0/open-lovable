<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient synapse -->
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF00FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00FF88;stop-opacity:1" />
    </linearGradient>
    
    <!-- Fond sombre -->
    <radialGradient id="bgGradient">
      <stop offset="0%" style="stop-color:#1A1F3A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A0E27;stop-opacity:1" />
    </radialGradient>
    
    <!-- Effet de lueur -->
    <filter id="iconGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Fond -->
  <rect width="64" height="64" rx="12" fill="url(#bgGradient)"/>
  
  <!-- Synapse central -->
  <g transform="translate(32, 32)">
    <!-- Neurone central -->
    <circle cx="0" cy="0" r="6" fill="url(#iconGradient)" filter="url(#iconGlow)" opacity="0.9"/>
    
    <!-- Connexions synaptiques - 8 branches -->
    <g stroke="url(#iconGradient)" stroke-width="2" fill="none" opacity="0.7">
      <!-- Haut -->
      <path d="M 0,-6 L 0,-20"/>
      <circle cx="0" cy="-20" r="3" fill="url(#iconGradient)"/>
      
      <!-- Haut-droite -->
      <path d="M 4,-4 L 14,-14"/>
      <circle cx="14" cy="-14" r="3" fill="url(#iconGradient)"/>
      
      <!-- Droite -->
      <path d="M 6,0 L 20,0"/>
      <circle cx="20" cy="0" r="3" fill="url(#iconGradient)"/>
      
      <!-- Bas-droite -->
      <path d="M 4,4 L 14,14"/>
      <circle cx="14" cy="14" r="3" fill="url(#iconGradient)"/>
      
      <!-- Bas -->
      <path d="M 0,6 L 0,20"/>
      <circle cx="0" cy="20" r="3" fill="url(#iconGradient)"/>
      
      <!-- Bas-gauche -->
      <path d="M -4,4 L -14,14"/>
      <circle cx="-14" cy="14" r="3" fill="url(#iconGradient)"/>
      
      <!-- Gauche -->
      <path d="M -6,0 L -20,0"/>
      <circle cx="-20" cy="0" r="3" fill="url(#iconGradient)"/>
      
      <!-- Haut-gauche -->
      <path d="M -4,-4 L -14,-14"/>
      <circle cx="-14" cy="-14" r="3" fill="url(#iconGradient)"/>
    </g>
    
    <!-- Points de connexion lumineux -->
    <g fill="#00D4FF" opacity="0.8">
      <circle cx="0" cy="-10" r="1"/>
      <circle cx="7" cy="-7" r="1"/>
      <circle cx="10" cy="0" r="1"/>
      <circle cx="7" cy="7" r="1"/>
      <circle cx="0" cy="10" r="1"/>
      <circle cx="-7" cy="7" r="1"/>
      <circle cx="-10" cy="0" r="1"/>
      <circle cx="-7" cy="-7" r="1"/>
    </g>
  </g>
</svg>